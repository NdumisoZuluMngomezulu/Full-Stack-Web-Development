<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Watchlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Movie Watchlist</h1>
  <form id="movie-form">
    <input id="title" placeholder="Movie title" required>
    <input id="rating" type="number" min="1" max="10" placeholder="Rating" required>
    <button>Add</button>
  </form>
  <ul id="movie-list"></ul>
<script src="app.js"></script>
</body>
</html>
